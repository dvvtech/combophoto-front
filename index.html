<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combophoto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1>Combophoto</h1>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#9790;</button>
    </header>

    <div class="container">
        <div class="section-title">Upload Photos <span class="counter" id="photoCounter"></span></div>

        <div class="upload-zone" id="uploadZone">
            <div class="icon">&#128247;</div>
            <p>Click or drag photos here</p>
            <p class="hint">Up to 4 photos, JPG/PNG</p>
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>

        <div class="photos-grid" id="photosGrid"></div>

        <button class="combo-btn" id="comboBtn" disabled>
            Combo!
        </button>

        <div class="result-section" id="resultSection">
            <div class="section-title">Result</div>
            <div class="result-image-wrapper">
                <img id="resultImage" src="" alt="Result">
            </div>
            <div class="result-actions">
                <button class="action-btn" id="saveBtn">
                    <span class="btn-icon">&#128190;</span> Save
                </button>
                <button class="action-btn" id="shareBtn">
                    <span class="btn-icon">&#128279;</span> Share
                </button>
            </div>
        </div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <div class="lightbox" id="lightbox">
        <img id="lightboxImg" src="" alt="">
    </div>

    <script src="app.js"></script>
</body>
</html>
