<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combophoto</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f5f7;
            --bg-card: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: #d2d2d7;
            --overlay: rgba(0,0,0,0.45);
            --danger: #ff3b30;
            --success: #34c759;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: 0.3s ease;
        }

        [data-theme="dark"] {
            --bg: #1d1d1f;
            --bg-card: #2c2c2e;
            --text: #f5f5f7;
            --text-secondary: #98989d;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --border: #48484a;
            --overlay: rgba(0,0,0,0.65);
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background var(--transition), border-color var(--transition);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .theme-toggle {
            background: none;
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: border-color var(--transition), transform 0.2s;
            color: var(--text);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        .section-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            background: var(--bg-card);
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(0,113,227,0.04);
        }

        .upload-zone .icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .upload-zone p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .upload-zone .hint {
            font-size: 13px;
            margin-top: 6px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        #fileInput {
            display: none;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .photo-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .photo-card:hover {
            box-shadow: var(--shadow);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-card .remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--overlay);
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .photo-card:hover .remove-btn {
            opacity: 1;
        }

        .combo-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background var(--transition), transform 0.15s;
        }

        .combo-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .combo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 32px;
            display: none;
        }

        .result-section.visible {
            display: block;
        }

        .result-image-wrapper {
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: border-color var(--transition);
        }

        .result-image-wrapper img {
            width: 100%;
            display: block;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition), transform 0.15s;
        }

        .action-btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .action-btn .btn-icon {
            font-size: 18px;
        }

        .error-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--danger);
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 200;
            max-width: 90vw;
            text-align: center;
        }

        .error-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 150;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            border-radius: 8px;
            object-fit: contain;
        }

        .counter {
            display: inline-block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: 6px;
            font-weight: 400;
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Combophoto</h1>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#9790;</button>
    </header>

    <div class="container">
        <div class="section-title">Upload Photos <span class="counter" id="photoCounter"></span></div>

        <div class="upload-zone" id="uploadZone">
            <div class="icon">&#128247;</div>
            <p>Click or drag photos here</p>
            <p class="hint">Up to 4 photos, JPG/PNG</p>
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>

        <div class="photos-grid" id="photosGrid"></div>

        <button class="combo-btn" id="comboBtn" disabled>
            Combo!
        </button>

        <div class="result-section" id="resultSection">
            <div class="section-title">Result</div>
            <div class="result-image-wrapper">
                <img id="resultImage" src="" alt="Result">
            </div>
            <div class="result-actions">
                <button class="action-btn" id="saveBtn">
                    <span class="btn-icon">&#128190;</span> Save
                </button>
                <button class="action-btn" id="shareBtn">
                    <span class="btn-icon">&#128279;</span> Share
                </button>
            </div>
        </div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <div class="lightbox" id="lightbox">
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        const API_BASE = 'https://api.cloud-platform.pro/combophoto';
        const MAX_PHOTOS = 4;

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const photosGrid = document.getElementById('photosGrid');
        const comboBtn = document.getElementById('comboBtn');
        const resultSection = document.getElementById('resultSection');
        const resultImage = document.getElementById('resultImage');
        const saveBtn = document.getElementById('saveBtn');
        const shareBtn = document.getElementById('shareBtn');
        const themeToggle = document.getElementById('themeToggle');
        const errorToast = document.getElementById('errorToast');
        const photoCounter = document.getElementById('photoCounter');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        let photos = [];
        let resultUrl = '';

        function updateCounter() {
            photoCounter.textContent = photos.length > 0 ? `(${photos.length}/${MAX_PHOTOS})` : '';
        }

        function updateComboBtn() {
            comboBtn.disabled = photos.length < 2;
        }

        function renderPhotos() {
            photosGrid.innerHTML = '';
            photos.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <img src="${photo.previewUrl}" alt="Photo ${index + 1}">
                    <button class="remove-btn" data-index="${index}" title="Remove">&times;</button>
                `;
                card.querySelector('img').addEventListener('click', () => openLightbox(photo.previewUrl));
                card.querySelector('.remove-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removePhoto(index);
                });
                photosGrid.appendChild(card);
            });
            updateCounter();
            updateComboBtn();
        }

        function removePhoto(index) {
            photos.splice(index, 1);
            renderPhotos();
        }

        function addFiles(files) {
            const remaining = MAX_PHOTOS - photos.length;
            if (remaining <= 0) {
                showError('Maximum 4 photos allowed');
                return;
            }
            const toAdd = Array.from(files).slice(0, remaining);
            for (const file of toAdd) {
                if (!file.type.startsWith('image/')) continue;
                if (photos.length >= MAX_PHOTOS) break;
                const previewUrl = URL.createObjectURL(file);
                photos.push({ file, previewUrl, serverUrl: null });
            }
            renderPhotos();
        }

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            addFiles(fileInput.files);
            fileInput.value = '';
        });

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });

        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.classList.add('show');
            setTimeout(() => errorToast.classList.remove('show'), 3000);
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch(`${API_BASE}/files/upload`, {
                method: 'POST',
                body: formData
            });
            if (!res.ok) throw new Error('Upload failed');
            const data = await res.json();
            return data.Url;
        }

        comboBtn.addEventListener('click', async () => {
            if (photos.length < 2) return;

            const originalHTML = comboBtn.innerHTML;
            comboBtn.disabled = true;
            comboBtn.innerHTML = '<div class="spinner"></div> Combining...';
            resultSection.classList.remove('visible');

            try {
                const uploadedUrls = [];
                for (const photo of photos) {
                    if (photo.serverUrl) {
                        uploadedUrls.push(photo.serverUrl);
                    } else {
                        const url = await uploadFile(photo.file);
                        photo.serverUrl = url;
                        uploadedUrls.push(url);
                    }
                }

                const mergeRes = await fetch(`${API_BASE}/merge/run`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ImageUrls: uploadedUrls })
                });

                if (!mergeRes.ok) throw new Error('Merge failed');
                const resultText = await mergeRes.text();
                let finalUrl = resultText;
                try {
                    const parsed = JSON.parse(resultText);
                    finalUrl = typeof parsed === 'string' ? parsed : parsed.url || parsed.Url || parsed.resultUrl || resultText;
                } catch {}

                resultUrl = finalUrl;
                resultImage.src = resultUrl;
                resultImage.onload = () => {
                    resultSection.classList.add('visible');
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
            } catch (err) {
                showError(err.message || 'Something went wrong');
            } finally {
                comboBtn.innerHTML = originalHTML;
                updateComboBtn();
            }
        });

        saveBtn.addEventListener('click', async () => {
            if (!resultUrl) return;
            try {
                const response = await fetch(resultUrl);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'combophoto-result.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch {
                window.open(resultUrl, '_blank');
            }
        });

        shareBtn.addEventListener('click', async () => {
            if (!resultUrl) return;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Combophoto Result',
                        url: resultUrl
                    });
                } catch {}
            } else {
                try {
                    await navigator.clipboard.writeText(resultUrl);
                    const btn = shareBtn;
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<span class="btn-icon">&#10003;</span> Copied!';
                    setTimeout(() => { btn.innerHTML = orig; }, 2000);
                } catch {
                    showError('Copy not supported in this browser');
                }
            }
        });

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('open');
        }

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('open');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('open')) {
                lightbox.classList.remove('open');
            }
        });

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
            localStorage.setItem('combophoto-theme', theme);
        }

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        (function initTheme() {
            const saved = localStorage.getItem('combophoto-theme');
            if (saved) {
                applyTheme(saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                applyTheme('dark');
            }
        })();
    </script>
</body>
</html>
